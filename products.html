<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | AMIS Global Exports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background:#f4f9f6; color:#333; line-height: 1.6; }

        /* Navigation */
        header { background:white; box-shadow:0 3px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .navbar { width:90%; margin:auto; display:flex; justify-content:space-between; align-items:center; padding:15px 0; }
        .logo img { height:60px; }
        nav a { margin-left:25px; text-decoration:none; color:#333; font-weight:600; transition: 0.3s; }
        nav a:hover { color:#0f6b3e; }

        /* Hero */
        .prod-hero {
            background: linear-gradient(rgba(15, 107, 62, 0.85), rgba(15, 107, 62, 0.85)), url('herbs.jpg');
            background-size: cover; background-position: center;
            padding: 80px 20px; text-align: center; color: white;
        }

        /* Product Grid */
        .section { padding: 50px 8%; }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Modern Product Card */
        .product-card {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); transition: 0.4s ease;
            display: flex; flex-direction: column; position: relative; border: 1px solid #eee;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.12); }
        
        .badge { position: absolute; top: 15px; right: 15px; background: #0f6b3e; color: white; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; z-index: 10; }
        .origin-tag { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        
        .product-card img { width: 100%; height: 230px; object-fit: cover; transition: 0.5s; }
        .product-card:hover img { scale: 1.05; }
        
        .card-content { padding: 20px; flex-grow: 1; }
        .card-content h3 { color: #0f6b3e; margin-bottom: 10px; font-size: 1.3rem; }
        .card-content p { font-size: 14px; color: #666; height: 45px; overflow: hidden; }
        
        .feature-tag { display: inline-block; background: #eef7f2; color: #0f6b3e; padding: 4px 10px; border-radius: 4px; font-size: 11px; margin: 10px 5px 0 0; font-weight: 600; }
        
        /* Interactive Buttons */
        .btn-group { display: flex; gap: 10px; padding: 0 20px 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; text-align: center; text-decoration: none; transition: 0.3s; }
        .btn-view { background: #0f6b3e; color: white; }
        .btn-view:hover { background: #0a4d2c; }
        .btn-quote { background: #f0fdf4; color: #0f6b3e; border: 1px solid #0f6b3e; }
        .btn-quote:hover { background: #0f6b3e; color: white; }

        /* Modal / Pop-up */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content {
            background: white; margin: 2% auto; padding: 40px; width: 90%;
            max-width: 950px; border-radius: 20px; position: relative; max-height: 92vh; overflow-y: auto;
        }
        .close { position: absolute; right: 25px; top: 20px; font-size: 35px; cursor: pointer; color: #999; }
        .modal-grid { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 40px; }
        .modal-info h2 { color: #0f6b3e; font-size: 2rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-info h4 { margin: 20px 0 8px; color: #333; font-size: 17px; display: flex; align-items: center; gap: 8px; }
        .modal-info ul { padding-left: 20px; font-size: 15px; color: #555; }
        .spec-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .spec-box { background: #f9f9f9; padding: 15px; border-radius: 10px; border-top: 3px solid #0f6b3e; }
        .spec-box strong { display: block; font-size: 12px; color: #888; text-transform: uppercase; }

        footer { background:#0f6b3e; color:white; text-align:center; padding:40px; margin-top: 50px; }

        @media(max-width: 768px) { .modal-grid { grid-template-columns: 1fr; } .modal-content { margin: 5% auto; padding: 20px; } }
    </style>
</head>

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = productData.map(p => `
            <div class="product-card">
                <span class="origin-tag">📍 ${p.origin}</span>
                <span class="badge">Export Grade</span>
                <img src="${p.img}" alt="${p.name}" onerror="this.src='herbs.jpg'">
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <p>${p.desc}</p>
                    <div>${p.tags.map(t => `<span class="feature-tag">${t}</span>`).join('')}</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-view" onclick="openModal(${p.id})">View Details</button>
                    <a href="contact.html?product=${p.name}" class="btn btn-quote">Get Quote</a>
                </div>
            </div>
        `).join('');
    }

    function openModal(id) {
        const p = productData.find(item => item.id === id);
        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalData');
        
        content.innerHTML = `
            <div class="modal-grid">
                <img src="${p.img}" style="width:100%; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,0.1);" onerror="this.src='herbs.jpg'">
                <div class="modal-info">
                    <h2>${p.name}</h2>
                    <p style="color:#666; font-style:italic;">${p.desc}</p>
                    
                    <h4><i class="fas fa-leaf"></i> Health Benefits</h4>
                    <ul>${p.benefits.map(b => `<li>${b}</li>`).join('')}</ul>
                    
                    <h4><i class="fas fa-flask"></i> Commercial Uses</h4>
                    <ul>${p.uses.map(u => `<li>${u}</li>`).join('')}</ul>

                    <div class="spec-container">
                        <div class="spec-box">
                            <strong>Min. Order (MOQ)</strong>
                            ${p.moq}
                        </div>
                        <div class="spec-box">
                            <strong>Packaging</strong>
                            ${p.packaging}
                        </div>
                    </div>
                    <p style="margin-top:15px; font-size:13px; color:#444;"><strong>Specs:</strong> ${p.specs}</p>
                    <br>
                    <a href="contact.html?product=${p.name}" class="btn btn-view" style="display:block">Inquire for Bulk Export</a>

        `;
        modal.style.display = "block";
    }

    function closeModal() { document.getElementById('productModal').style.display = "none"; }
